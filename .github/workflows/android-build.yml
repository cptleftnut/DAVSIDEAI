name: DAVSIDE AI - Android Build & Release
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend deps
        working-directory: client
        run: npm install
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0"
      - name: Build Android App
        run: |
          cd src-tauri
          cargo tauri android init --package-name com.davside.ai --version-code 3 --version-name 0.3.0
          cargo tauri android build --target aarch64-linux-android
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: davside-ai-android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/release/*.apk
