name: DAVSIDE AI - Android Build & Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [debug, release]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android armv7-linux-androideabi
          
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        
        - name: Install dependencies
        run: npm install
        
        - name: Build frontend
        run: npm run build
        
        - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          if [ -f "bun.lockb" ]; then
            curl -fsSL https://bun.sh/install | bash
            ~/bin/bun install
          else
            npm ci --legacy-peer-deps || npm install --legacy-peer-deps
          fi

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: r27

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Initialiser Android hvis nødvendigt
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            cargo tauri android init
          fi

      - name: Build ${{ matrix.variant }} APK
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          if [ "${{ matrix.variant }}" = "release" ]; then
            cargo tauri android build -- --release
          else
            cargo tauri android build --debug
          fi

      - name: Upload ${{ matrix.variant }} APK
        uses: actions/upload-artifact@v4
        with:
          name: davside-ai-${{ matrix.variant }}-apk
          path: src-tauri/gen/android/app/build/outputs/apk/${{ matrix.variant }}/app- ${{ matrix.variant }}.apk
          retention-days: 14
