name: DAVSIDE AI - Android Build & Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [debug, release]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0 ndk;27.0.12077973'

      - name: Set NDK env
        run: |
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Generate Tauri icons (if missing)
        run: |
          if [ ! -f "src-tauri/icons/icon.png" ]; then
            echo "Genererer placeholder ikon..."
            sudo apt-get update && sudo apt-get install -y imagemagick
            mkdir -p src-tauri/icons
            convert -size 1024x1024 xc:'#1e3a8a' src-tauri/icons/icon.png
          fi
          cargo tauri icon src-tauri/icons/icon.png

      - name: Initialize Android project
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            cargo tauri android init
          fi

      - name: Build ${{ matrix.variant }} APK
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          NDK_HOME: ${{ env.NDK_HOME }}
        run: |
          if [ "${{ matrix.variant }}" = "release" ]; then
            cargo tauri android build --apk
          else
            cargo tauri android build --apk --debug
          fi

      - name: Upload ${{ matrix.variant }} APK
        uses: actions/upload-artifact@v4
        with:
          name: davside-ai-${{ matrix.variant }}-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          retention-days: 14
          if-no-files-found: warn
